name: research-gemini
kind: infrastructure
version: 0.1.0
description: >-
  Gemini Deep Research provider for `wiki research`. Contributes one
  block to the shared research-providers.yaml managed region
  "providers" naming the Google Generative Language API
  generateContent endpoint, the default model (gemini-2.5-pro), and
  the env var the dispatcher reads (GEMINI_API_KEY). Uses grounded
  generation (the google_search tool) so responses carry citation
  URIs. Requires the seed primitive (infrastructure:research) so the
  shared config file exists on disk before the aggregator writes the
  region.
requires:
  - research
contributes_to:
  - file: research-providers.yaml
    region: providers
