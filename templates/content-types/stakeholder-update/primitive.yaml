name: stakeholder-update
kind: content-type
version: 0.1.0
description: >-
  Stakeholder-update page type. Ships an ingester skill (paste a status note,
  email draft, or slide bullets and get a structured update page), a page
  template, and the schema contributions that make `type: stakeholder-update`
  a valid value with update-scoped fields. Feeds `status-synthesis`.
requires:
  - people
  - projects
# No routing: block — manual-only. Stakeholder updates arrive as pasted
# status notes, email drafts, or slide bullets with no reliable filename
# or extension signal; reach this primitive via
# `wiki ingest --as stakeholder-update`.
contributes_to:
  - file: frontmatter.schema.yaml
    region: types
  - file: frontmatter.schema.yaml
    region: fields
