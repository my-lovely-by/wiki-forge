name: decision
kind: content-type
version: 0.1.0
description: >-
  Decision page type. Ships an ingester skill (paste a meeting decision,
  email thread, or written rationale and get a structured decision page),
  a page template, and the schema contributions that make `type: decision`
  a valid value with decision-scoped fields. Decisions cross-cut projects,
  domains, and customers; they are the durable record of "what we chose,
  why, and what we considered."
requires: []
# No routing: block — manual-only. Decisions arrive as pasted meeting
# excerpts, email threads, or written rationale with no reliable filename
# or extension signal; reach this primitive via `wiki ingest --as decision`.
contributes_to:
  - file: frontmatter.schema.yaml
    region: types
  - file: frontmatter.schema.yaml
    region: fields
