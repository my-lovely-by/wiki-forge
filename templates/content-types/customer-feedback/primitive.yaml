name: customer-feedback
kind: content-type
version: 0.1.0
description: >-
  Customer-feedback page type. Ships an ingester skill (paste a support
  ticket, sales call note, survey response, or NPS comment and get a
  structured feedback page), a page template, and the schema contributions
  that make `type: customer-feedback` a valid value with feedback-scoped
  fields. Feeds `status-synthesis` and `onboarding-pack`.
requires:
  - customers
  - people
# No routing: block — manual-only. Feedback arrives as pasted ticket text,
# call notes, or survey responses with no reliable filename/extension
# signal; reach this primitive via `wiki ingest --as customer-feedback`.
contributes_to:
  - file: frontmatter.schema.yaml
    region: types
  - file: frontmatter.schema.yaml
    region: fields
